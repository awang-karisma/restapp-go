name: PR Check (Main)

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  comment-status:
    runs-on: ubuntu-latest
    name: Comment PR Status
    needs: [build, lint]
    if: always()
    steps:
      - name: Update PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ needs.build.result }}';
            const lintStatus = '${{ needs.lint.result }}';
            
            const buildEmoji = buildStatus === 'success' ? '✅' : '❌';
            const lintEmoji = lintStatus === 'success' ? '✅' : '❌';
            
            const body = `## PR Check Results (Main Branch)
            
            | Check | Status |
            |-------|--------|
            | Build | ${buildEmoji} ${buildStatus} |
            | Lint | ${lintEmoji} ${lintStatus} |
            
            ${buildStatus !== 'success' || lintStatus !== 'success' ? '⚠️ Please fix the issues above before merging.' : '✅ All checks passed!'}
            `;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('PR Check Results (Main Branch)')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
